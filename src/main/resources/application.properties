spring.application.name=WorldCupAnalysis

# --- API-Football (https://www.api-football.com/, api-sports.io) ---
# Register at dashboard.api-football.com and set APIFOOTBALL_API_KEY.
# When the key is missing or the API call fails/returns nothing, the app falls
# back to bundled sample data so the site still renders.
# World Cup is league id 1; set the season (year) you want to display.
# NOTE: the API-Football *free* plan only allows seasons 2022-2024, so the live
# 2026 World Cup needs a paid plan. With the free plan + season=2026 the live
# call returns 0 fixtures and the app falls back to the bundled real 2026
# schedule in sample/wc-matches.json. Upgrade the plan to get live 2026 data,
# or set season=2022 to pull the live 2022 (Qatar) tournament on the free plan.
apifootball.base-url=https://v3.football.api-sports.io
apifootball.api-key=${APIFOOTBALL_API_KEY:}
apifootball.league=1
apifootball.season=2026

# --- AI analysis providers ---
# Priority: Gemini (if GEMINI_API_KEY set) -> Claude (if ANTHROPIC_API_KEY set)
# -> bundled curated static analysis. So either key (or neither) works.

# Google Gemini (generativelanguage v1beta). Set GEMINI_API_KEY to enable.
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash

# Anthropic Claude. Set ANTHROPIC_API_KEY to enable.
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-opus-4-8

# Display timezone for kickoff times (Korean user).
app.display-zone=Asia/Seoul
